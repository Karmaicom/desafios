version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres_apitransacaosimplificada
    restart: always
    environment:
      POSTGRES_DB: bd-api-transacaosimplificada
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: Coti@2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_apitransacaosimplificada:/var/lib/postgresql/data
    networks:
      - api_transacaosimplificada_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_apitransacaosimplificada
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data_apitransacaosimplificada:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - api_transacaosimplificada_network

volumes:
  postgres_data_apitransacaosimplificada:
  pgadmin_data_apitransacaosimplificada:

networks:
  api_transacaosimplificada_network:
    driver: bridge